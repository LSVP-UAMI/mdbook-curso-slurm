services:
  mdbook:
    container_name: Curso_SLURM
    # image: peaceiris/mdbook:latest
    image: peaceiris/mdbook:v0.4.40
    stdin_open: true
    tty: true
    ports:
      - 3000:3000
      - 3001:3001
    volumes:
      - ${PWD}:/book
    command:
      - serve
      - --hostname
      - '0.0.0.0'
